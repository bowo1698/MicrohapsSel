# .github/workflows/build-release.yml
name: Build and Release VCF Converter Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.config.target }}
    runs-on: ${{ matrix.config.os }}
    
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x64-linux
            ext: tar.gz
          
          - os: macOS-latest
            target: x86_64-apple-darwin
            arch: x64
            ext: tar.gz
          
          - os: macos-14
            target: aarch64-apple-darwin
            arch: arm64-macos
            ext: tar.gz
          
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64-windows
            ext: zip
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.config.target }}
      
      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.config.target }}
      
      - name: Prepare binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.config.target }}/release/convert-to-vcf dist/
          cp target/${{ matrix.config.target }}/release/convert-from-vcf dist/
          chmod +x dist/convert-to-vcf
          chmod +x dist/convert-from-vcf

          # Remove macOS quarantine attributes (signing bypass)
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            xattr -cr dist/ 2>/dev/null || true
          fi
          
          cd dist
          tar -czf vcf-converter-${{ matrix.config.arch }}.tar.gz convert-to-vcf convert-from-vcf
          mv vcf-converter-${{ matrix.config.arch }}.tar.gz ../
      
      - name: Prepare binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.config.target }}/release/convert-to-vcf.exe dist/
          Copy-Item target/${{ matrix.config.target }}/release/convert-from-vcf.exe dist/
          Compress-Archive -Path dist/* -DestinationPath vcf-converter-${{ matrix.config.arch }}.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vcf-converter-${{ matrix.config.arch }}
          path: vcf-converter-${{ matrix.config.arch }}.${{ matrix.config.ext }}
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vcf-converter-*
          merge-multiple: true
      
      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -lh artifacts/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: VCF Converter ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}